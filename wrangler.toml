name = "prompt-optimizer"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"

# Secrets (set via `wrangler pages secret put <NAME>`, not committed here):
#   OPENROUTER_API_KEY  — shared key for the hosted instance's free-tier fallback
#   NVIDIA_API_KEY      — alternative shared key if HOSTED_PROVIDER = "nvidia"
#
# Plain vars for the hosted instance (safe to set in the Cloudflare dashboard):
#   HOSTED_PROVIDER = "openrouter" | "nvidia"
#   HOSTED_MODEL    = e.g. "deepseek/deepseek-chat-v3.1:free"
#
# When neither secret is set (e.g. a visitor's own `wrangler pages dev` or a
# fork with no secrets configured), users must supply their own API key via
# the in-page Settings panel — nothing works without one or the other.

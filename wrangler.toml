name = "prompt-optimizer"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"

# Secrets (set via `wrangler pages secret put <NAME>`, not committed here):
#   NVIDIA_API_KEY      — shared key for the hosted instance's free-tier fallback
#   OPENROUTER_API_KEY  — shared key for the cross-provider fallback below
#   GOOGLE_API_KEY      — shared key for the Gemini free-tier fallback below
#                         (get one at aistudio.google.com; run:
#                         `wrangler pages secret put GOOGLE_API_KEY`
#                         and paste the key when prompted — never in this file)
#
# Plain vars for the hosted instance (safe to set in the Cloudflare dashboard):
#   HOSTED_PROVIDER          = comma-separated provider list, tried in order
#                              if every model on one provider errors out.
#   HOSTED_MODEL             = comma-separated model list for the *first*
#                              provider in HOSTED_PROVIDER.
#   HOSTED_MODEL_<PROVIDER>  = comma-separated model list scoped to that
#                              provider (e.g. HOSTED_MODEL_OPENROUTER).
#
# When no secret is set for any listed provider (e.g. a visitor's own
# `wrangler pages dev` or a fork with no secrets configured), users must
# supply their own API key via the in-page Settings panel.

[vars]
# Provider order: Google first (best speed×intelligence), NVIDIA NIM second, OpenRouter last.
HOSTED_PROVIDER = "google,nvidia,openrouter"

# Google — Gemini 3.5 Flash: 50.2 intelligence, 203 tps — best speed×quality balance overall.
HOSTED_MODEL_GOOGLE = "gemini-3-5-flash,gemini-3-1-flash-lite"

# NVIDIA NIM — ordered by intelligence×speed product; many fallbacks since NIM rotates models.
# glm-5.2: 51 intel × 175 tps | minimax-m3: 44 × 100 | deepseek-v4-pro: 44 × 60
# deepseek-v4-flash: 40 × 95 | nemotron-ultra: 38 × 167 | step-3.7-flash: 30 × 385
# kimi-k2.6: 43 × 42 | nemotron-super: 25 × 332 | minimax-m2.7: 38 × 49 | qwen3.5-122b: 32 × 144
HOSTED_MODEL_NVIDIA = "stepfun-ai/step-3.7-flash,moonshotai/kimi-k2.6,nvidia/nemotron-3-super-120b-a12b,minimaxai/minimax-m3,nvidia/nemotron-3-ultra-550b-a55b,minimaxai/minimax-m2.7,qwen/qwen3.5-122b-a10b,z-ai/glm-5.2,deepseek-ai/deepseek-v4-pro,deepseek-ai/deepseek-v4-flash"

# OpenRouter free tier — last resort.
HOSTED_MODEL_OPENROUTER = "nvidia/nemotron-3-ultra-550b-a55b:free,google/gemma-4-31b-it:free,openrouter/free"
